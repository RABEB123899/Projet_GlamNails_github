version: "3.9"

services:

  # ── Service principal : l'application ─────────
  taskflow:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: taskflow-app

    ports:
      - "${APP_PORT:-3000}:80"

    environment:
      - NODE_ENV=${NODE_ENV:-development}

    volumes:
      - ./app:/usr/share/nginx/html:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout:  5s
      retries:  3

    networks:
      - taskflow-network

networks:
  taskflow-network:
    driver: bridge