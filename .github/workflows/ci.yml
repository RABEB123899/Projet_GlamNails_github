name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature-docker-v1
  pull_request:
    branches:
      - main
      - develop

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vérifier HTML
        run: |
          test -f html/index.html
          test -f html/inscription.html
          test -f html/produits.html

      - name: Vérifier CSS
        run: |
          test -d css

      - name: Vérifier JS
        run: |
          test -d js

      - name: Vérifier images
        run: |
          test -d images

      - name: Build Docker
        run: docker build -t glamnails-ci .